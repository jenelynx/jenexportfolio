<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Educational Portfolio</title>
  <!-- Google Sign-In client library (kept as in original) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
  
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    body {
      background: linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
                  url("https://i.pinimg.com/1200x/b3/be/3a/b3be3a3d7253c5e0d796574cae5a3391.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    
    .card {
      background: white;
      padding: 40px 38px;
      width: 480px;              
      max-width: 100%;
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
      transition: 0.3s;
    }

    .card h2 {
      font-size: 28px;
      margin-bottom: 28px;
      color: #006080;           
      text-align: center;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    
    .login-form input {
      width: 100%;
      padding: 15px 18px;
      margin-bottom: 20px;
      border: 1px solid #d1d9e6;
      border-radius: 14px;
      font-size: 15px;
      background-color: #f9fcff;
      transition: all 0.2s ease;
      outline: none;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
    }

    .login-form input:focus {
      border-color: #00ace6;
      background-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(0,172,230,0.15), inset 0 1px 3px rgba(0,0,0,0.05);
    }

    .login-form input::placeholder {
      color: #8899aa;
      font-weight: 400;
      opacity: 0.8;
    }

  
    .password-wrapper {
      position: relative;
      width: 100%;
      margin-bottom: 20px;
    }

    .password-wrapper input {
      margin-bottom: 0;           
      padding-right: 70px;        
    }

    .toggle-show {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #006080;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 30px;
      transition: 0.15s;
      letter-spacing: 0.3px;
    }

    .toggle-show:hover {
      background-color: rgba(0,96,128,0.08);
      color: #00ace6;
    }

   
    .login-form button[type="submit"] {
      width: 100%;
      padding: 15px 20px;
      background: #00ace6;        
      color: white;
      border: none;
      border-radius: 40px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 8px 18px rgba(0,172,230,0.3);
      margin-top: 8px;
      margin-bottom: 18px;
    }

    .login-form button[type="submit"]:hover {
      background: #0099cc;
      transform: scale(1.01);
      box-shadow: 0 10px 22px rgba(0,172,230,0.4);
    }

    .login-form button[type="submit"]:active {
      transform: scale(0.99);
    }

    
    .divider {
      display: flex;
      align-items: center;
      color: #8899aa;
      font-size: 14px;
      font-weight: 500;
      margin: 20px 0 18px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #d0ddee;
      margin: 0 12px;
    }

    
    .google-container {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
    }

   
    .g_id_signin {
      display: inline-block;
    }

    
    .card p {
      text-align: center;
      font-size: 15px;
      color: #334155;
      margin-top: 12px;
    }

    .card p a {
      color: #006080;
      text-decoration: none;
      font-weight: 700;
      margin-left: 5px;
      border-bottom: 2px solid transparent;
      transition: 0.2s;
    }

    .card p a:hover {
      border-bottom-color: #00ace6;
      color: #00ace6;
    }

    
    @media (max-width: 480px) {
      .card {
        padding: 30px 22px;
      }
      .card h2 {
        font-size: 24px;
      }
    }

    /* keep the original Google divs intact, just spacing */
    #g_id_onload {
      display: none;  /* hidden element, no need to show */
    }
  </style>
</head>
<body>

  
  <div class="card">
    <h2>Login</h2>

    <form id="loginForm" class="login-form">
      <!-- email input -->
      <input type="email" id="email" placeholder="Email" required>

      
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Password" required>
        <span class="toggle-show" onclick="togglePassword()">Show</span>
      </div>

      <button type="submit">Login</button>
    </form>

   
    <div class="divider">OR</div>

    
    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID"
         data-callback="handleCredentialResponse">
    </div>

    <div class="google-container">
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="outline"
           data-text="sign_in_with"
           data-shape="rectangular">
      </div>
    </div>

    <p>Don't have an account? <a href="register.html">Register</a></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
