<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Educational Portfolio</title>
  <style>
    /* ----- RESET & BASE (from the provided portfolio design) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    body {
      background: linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
                  url("https://i.pinimg.com/1200x/b3/be/3a/b3be3a3d7253c5e0d796574cae5a3391.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* ----- card style (exactly like the portfolio card) ----- */
    .card {
      background: white;
      padding: 40px 35px;
      width: 450px;
      max-width: 100%;
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
      transition: 0.3s;
    }

    .card h2 {
      font-size: 28px;
      margin-bottom: 28px;
      color: #006080;
      text-align: center;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    /* ----- form elements ----- */
    .register-form input {
      width: 100%;
      padding: 15px 18px;
      margin-bottom: 18px;
      border: 1px solid #d1d9e6;
      border-radius: 14px;
      font-size: 15px;
      background-color: #f9fcff;
      transition: all 0.2s ease;
      outline: none;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
    }

    .register-form input:focus {
      border-color: #00ace6;
      background-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(0,172,230,0.15), inset 0 1px 3px rgba(0,0,0,0.05);
    }

    .register-form input::placeholder {
      color: #8899aa;
      font-weight: 400;
      opacity: 0.8;
    }

    /* button / link styled exactly like the original button */
    .next-btn {
      display: block;
      width: 100%;
      padding: 15px 20px;
      background: #00ace6;
      color: white;
      border: none;
      border-radius: 40px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 8px 18px rgba(0,172,230,0.3);
      margin-top: 8px;
      margin-bottom: 20px;
      text-align: center;
      text-decoration: none;  /* remove underline for anchor */
    }

    .next-btn:hover {
      background: #0099cc;
      transform: scale(1.01);
      box-shadow: 0 10px 22px rgba(0,172,230,0.4);
    }

    .next-btn:active {
      transform: scale(0.99);
    }

    /* link paragraph – same color palette */
    .card p {
      text-align: center;
      font-size: 15px;
      color: #334155;
      margin-top: 10px;
    }

    .card p a {
      color: #006080;
      text-decoration: none;
      font-weight: 700;
      margin-left: 5px;
      border-bottom: 2px solid transparent;
      transition: 0.2s;
    }

    .card p a:hover {
      border-bottom-color: #00ace6;
      color: #00ace6;
    }

    .register-form {
      margin-top: 5px;
    }

    .container {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    @media (max-width: 480px) {
      .card {
        padding: 30px 22px;
      }
      .card h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h2>Register</h2>

      <!-- form remains – it won't be submitted because button is now a link -->
      <form id="registerForm" class="register-form">
        <input type="text" id="FullName" placeholder="First Name" required>
        <input type="email" id="regEmail" placeholder="Email" required>
        <input type="password" id="regPassword" placeholder="Password" required>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

        <!-- NEXT BUTTON – now a link to otp.html, styled exactly like the original button -->
        <a href="otp.html" class="next-btn">Next</a>
      </form>

      <p>
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </div>

  <!-- script.js may still be present, but it's no longer required for navigation -->
  <script src="script.js"></script>
</body>
</html>
