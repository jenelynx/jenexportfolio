<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OTP Verification</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>OTP</h2>
  <p>We sent an OTP to your email. Please enter it below.</p>

  <input type="text" id="otpInput" placeholder="Enter OTP" maxlength="6">

  <button onclick="verifyOTP()">Confirm</button>
  <button onclick="resendOTP()">Resend OTP</button>
</div>

<script src="script.js"></script>

<!-- Inline styles (can be moved to style.css) -->
<style>
  body {
    background: linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
                url("https://i.pinimg.com/1200x/b3/be/3a/b3be3a3d7253c5e0d796574cae5a3391.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  .container {
    background: white;
    padding: 40px 38px;
    width: 480px;
    max-width: 100%;
    border-radius: 20px;
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
    text-align: center;
  }
  h2 {
    font-size: 28px;
    margin-bottom: 12px;
    color: #006080;
    font-weight: 600;
  }
  p {
    color: #334155;
    margin-bottom: 28px;
    font-size: 16px;
  }
  input {
    width: 100%;
    padding: 15px 18px;
    margin-bottom: 24px;
    border: 1px solid #d1d9e6;
    border-radius: 14px;
    font-size: 16px;
    background-color: #f9fcff;
    outline: none;
    box-sizing: border-box;
    text-align: center;
    letter-spacing: 2px;
  }
  input:focus {
    border-color: #00ace6;
    box-shadow: 0 0 0 4px rgba(0,172,230,0.15);
  }
  button {
    width: 100%;
    padding: 15px 20px;
    background: #00ace6;
    color: white;
    border: none;
    border-radius: 40px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.15s;
    box-shadow: 0 8px 18px rgba(0,172,230,0.3);
    margin-bottom: 16px;
  }
  button:hover {
    background: #0099cc;
    transform: scale(1.01);
  }
  button:last-of-type {
    background: white;
    color: #006080;
    border: 2px solid #006080;
    box-shadow: none;
    margin-bottom: 0;
  }
  button:last-of-type:hover {
    background: #e6f2f5;
    border-color: #00ace6;
    color: #00ace6;
  }
</style>

<!-- Inline script (can be moved to script.js) -->
<script>
  // Generate a random 6-digit OTP
  let currentOTP = generateOTP();

  function generateOTP() {
    return Math.floor(100000 + Math.random() * 900000).toString(); // 6-digit
  }

  // On page load, simulate sending OTP (alert for demo)
  window.onload = function() {
    alert(`Demo: your OTP is ${currentOTP}`); // Parang na-email
  };

  function verifyOTP() {
    const entered = document.getElementById('otpInput').value;
    if (entered === currentOTP) {
      alert('Verified! Redirecting to login...');
      window.location.href = 'login.html';
    } else {
      alert('Invalid OTP. Please try again.');
    }
  }

  function resendOTP() {
    currentOTP = generateOTP(); // bagong OTP
    alert(`New OTP sent: ${currentOTP}`); // simulate resend
    document.getElementById('otpInput').value = '';
  }
</script>

</body>
</html>
